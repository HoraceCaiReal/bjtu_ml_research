[tool.ruff]
target-version = "py310"      # 针对 Python 3.10
line-length = 88              # 默认行宽，与 Black 兼容

[tool.ruff.lint]
# 基础规则集：E/W（pycodestyle）、F（Pyflakes）、I（isort 导入排序）
select = ["E", "W", "F", "I"]
# 忽略规则
ignore = [
    "E501",       # 行过长由 formatter 处理，linter 不重复报错
    "W191",       # 缩进包含制表符（Windows 上偶有误判）
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.format]
indent-style = "space"
line-ending = "native"        # Windows 用 CRLF，跨平台兼容
skip-magic-trailing-comma = false
