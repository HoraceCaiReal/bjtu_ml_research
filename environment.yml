name: bjtu_ml
channels:
  - conda-forge
  - defaults
dependencies:
  # Python 版本（双方必须一致）
  - python=3.10

  # 核心科学计算（conda 安装更稳定）
  - numpy=1.26
  - pandas=2.1
  - scikit-learn=1.4
  - scikit-image=0.22
  - matplotlib=3.8
  - seaborn=0.13
  - scipy

  # 图像处理（opencv 通过 pip 安装，避免 conda/pip 冲突）
  - pillow=10.2

  # Jupyter 生态
  - jupyterlab=4.0
  - notebook=7.0
  - ipywidgets=8.1
  - ipykernel=6.29

  # 工具库
  - pyyaml=6.0
  - tqdm=4.66
  - plotly=5.18

  # pip 补充包（conda 中没有或版本不合适）
  # 注意：PyTorch CUDA 版必须通过 pip + --extra-index-url 安装
  - pip
  - pip:
    - --extra-index-url https://mirrors.aliyun.com/pytorch-wheels/cu118
    - torch==2.1.1+cu118
    - torchvision==0.16.1+cu118
    # OpenCV（pip 版避免 conda DLL 冲突）
    - opencv-python==4.9.0.80
    # 工具与格式化
    - ruff==0.7.4
    - python-dotenv==1.0.0
    - nbstripout==0.7.1
    - timm==0.9.12
    - xgboost==2.0.3
    - tensorboard==2.15.1
